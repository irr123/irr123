{{- if and site.Params.grafanaFaro (ne site.Params.grafanaFaro "") -}}
<script>
  (function () {
    var webSdkScript = document.createElement("script");
    webSdkScript.src = "https://cdn.jsdelivr.net/npm/@grafana/faro-web-sdk@2/dist/bundle/faro-web-sdk.iife.js";
    webSdkScript.crossOrigin = "anonymous";
    webSdkScript.onload = () => {
      window.GrafanaFaroWebSdk.initializeFaro({
        url: {{ site.Params.grafanaFaro }},
        app: {
          name: "blog",
          version: "1.0.0",
          environment: "production",
        },
        sessionTracking: {
          samplingRate: 1,
          persistent: true,
        },
      });
    };

    document.head.appendChild(webSdkScript);
  })();
</script>
{{- end -}}

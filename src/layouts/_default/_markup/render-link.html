{{- $u := urls.Parse .Destination -}}
<a
  href="{{ .Destination }}"
  {{-
  with
  .Title
  }}
  title="{{ . }}"
  data-pagefind-index-attrs="title"
  {{
  end
  -}}
  {{-
  if
  $u.IsAbs
  }}
  target="_blank"
  rel="noopener noreferrer"
  {{
  end
  -}}
>
  {{- with .Text }}{{ . }}{{ end -}}
</a>
{{- /* https://gohugo.io/render-hooks/links/ */ -}}
